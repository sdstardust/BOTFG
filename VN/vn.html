<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Visual Novel</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    background: black;
  }

  #game {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  /* Background */
  #bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("https://picsum.photos/1280/720") center/cover;
  }

  /* Character */
  #character {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    height: 80%;
  }

  /* Dialogue box */
  #dialogueBox {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 20px;
  }

  #name {
    font-weight: bold;
    margin-bottom: 10px;
  }

  /* Choices */
  #choices {
    margin-top: 10px;
  }

  button {
    display: block;
    margin: 5px 0;
    padding: 10px;
    width: 100%;
    border: none;
    background: #444;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #666;
  }
</style>
</head>

<body>

<div id="game">
  <div id="bg"></div>
  <img id="character" src="/VN/silentheart.png">

  <div id="dialogueBox">
    <div id="name"></div>
    <div id="text"></div>
    <div id="choices"></div>
  </div>
</div>

<script>
const story = {
  start: {
    name: "",
    text: "คุณตื่นขึ้นมาในห้องแปลกๆ...",
    choices: [
      { text: "ลุกขึ้น", next: "meet" }
    ]
  },

  meet: {
    name: "???",
    text: "ในที่สุดก็ตื่นสินะ...",
    choices: [
      { text: "คุณคือใคร?", next: "who" },
      { text: "ไม่สนใจ", next: "rude" }
    ]
  },

  who: {
    name: "Silent Heart",
    text: "ฉันชื่อ Silent Heart ยินดีที่ได้รู้จัก",
    choices: [
      { text: "ยินดีเช่นกัน", next: "goodEnd" }
    ]
  },

  rude: {
    name: "Silent Heart",
    text: "หยาบคายชะมัด...",
    choices: [
      { text: "ขอโทษ", next: "goodEnd" },
      { text: "ก็แล้วไง", next: "badEnd" }
    ]
  },

  goodEnd: {
    name: "",
    text: "คุณเริ่มต้นมิตรภาพใหม่ 🌸 (Good Ending)",
    choices: []
  },

  badEnd: {
    name: "",
    text: "คุณถูกไล่ออกจากห้องทันที 💀 (Bad Ending)",
    choices: []
  }
};

let current = "start";

function render() {
  const scene = story[current];

  document.getElementById("name").innerText = scene.name;
  document.getElementById("text").innerText = scene.text;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  scene.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.innerText = choice.text;
    btn.onclick = () => {
      current = choice.next;
      render();
    };
    choicesDiv.appendChild(btn);
  });
}

render();
</script>

</body>
</html>
